syntax = "proto3";

package kvstore;

service KeyValueStore {
    rpc Put(PutRequest) returns (PutResponse) {}
    rpc Get(GetRequest) returns (GetResponse) {}
    rpc Delete(DeleteRequest) returns (DeleteResponse) {}
    rpc SyncLogs(SyncRequest) returns (SyncResponse) {}
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {}
}

message PutRequest {
    string key = 1;
    string value = 2;
    int64 commit_id = 3;
    int64 term_id = 4;
}

message PutResponse {
    bool success = 1;
    string message = 2;
}

message GetRequest {
    string key = 1;
}

message GetResponse {
    bool found = 1;
    string value = 2;
}

message DeleteRequest {
    string key = 1;
    int64 commit_id = 2;
    int64 term_id = 3;
}

message DeleteResponse {
    bool success = 1;
    string message = 2;
}

message SyncRequest {
    int64 from_commit_id = 1;
}

message SyncEntry {
    string op = 1;
    string key = 2;
    string value = 3;
    int64 commit_id = 4;
    int64 term_id = 5;
}

message SyncResponse {
    repeated SyncEntry entries = 1;
}

message HeartbeatRequest {
    int64 term_id = 1;
    int64 commit_id = 2;
    int32 leader_port = 3;
}

message HeartbeatResponse {
    bool success = 1;
}
